appId: com.audioforge.app
productName: AudioForge
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - resources/**/*
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
  icon: resources/icons/icon.icns
win:
  target:
    - nsis
    - portable
  icon: resources/icons/icon.ico
linux:
  target:
    - AppImage
    - deb
  category: Audio
  icon: resources/icons
